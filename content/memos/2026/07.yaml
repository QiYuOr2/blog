    description: >-
      《我是猫》是日本文学大师夏目漱石的代表作，一向被奉为世界名著之一。小说通过猫的视觉观察明治维新后的日本社会，以幽默辛辣的语言，嘲笑和鞭挞了人类固有的弱点和金钱世界的社会时弊，还大量引用了古今东西哲人达士的名言，处处闪射着机智和文采，喜笑怒骂皆成文章。作品语言则典俚合炉，雅俗共赏，读来令人在笑声中抑制不住惊叹。
  content: 
    - '如果夏目漱石活在当代还会用QQ，想必会写一本《我是企鹅》出来吧，群友们的对话有时和苦沙弥他们无异，现在的社会和那个时候相比也未必有很大差别'
